<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Undangan Halal Bi Halal RT 02 - Scan TTD</title>
    <style>
        /* Konfigurasi untuk print */
        @page {
            size: A4 landscape;
            margin: 0;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #e5e7eb; /* Warna background saat dilihat di layar */
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1 Lembar A4 Landscape */
        .kertas-a4 {
            width: 297mm;
            height: 210mm;
            background: white;
            display: flex;
            flex-direction: row;
            page-break-after: always;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 10mm auto; /* Margin layar, tidak efek saat di-print */
        }

        @media print {
            body { background-color: white; }
            .kertas-a4 { margin: 0; box-shadow: none; }
            /* Memastikan gambar tercetak dengan baik */
            img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* Setengah A4 (A5 Portrait) */
        .undangan-a5 {
            width: 50%;
            height: 100%;
            padding: 15mm;
            box-sizing: border-box;
            position: relative;
        }

        /* Garis potong di tengah kertas */
        .undangan-a5:first-child {
            border-right: 1px dashed #ccc;
        }

        /* Border elegan double linen */
        .border-elegan {
            border: 4px double #1f2937;
            outline: 1px solid #1f2937;
            outline-offset: -8px;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Kop Surat */
        .kop-surat {
            text-align: center;
            border-bottom: 2px solid #1f2937;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .kop-surat h2, .kop-surat h3 { margin: 0; line-height: 1.2; }
        .kop-surat h2 { font-size: 16pt; font-weight: bold; }
        .kop-surat h3 { font-size: 12pt; font-weight: normal; }

        /* Isi Surat */
        .isi-surat {
            font-size: 11pt;
            line-height: 1.4;
            flex-grow: 1;
            color: #111;
        }
        .tujuan { margin-bottom: 12px; }
        .nama-tujuan { font-weight: bold; font-size: 12pt;}
        
        .detail-acara table {
            margin: 10px 0 10px 15px;
            border-collapse: collapse;
        }
        .detail-acara td {
            padding: 1px 10px 1px 0;
            vertical-align: top;
        }

        /* ========================================= */
        /* AREA TANDA TANGAN DAN CAP (BAGIAN PENTING) */
        /* ========================================= */
        
        .ttd-container {
            display: flex;
            justify-content: flex-end; /* Pojok kanan bawah */
            margin-top: 10px;
            position: relative; /* Supaya cap bisa diposisikan absolut terhadap ini */
            height: 120px; /* Memberi ruang untuk ttd dan cap */
        }
        
        .ttd-box {
            text-align: center;
            width: 200px;
            position: relative;
            z-index: 2; /* Tanda tangan dan nama di atas cap agar tidak tertutup total */
        }
        
        /* Gambar Tanda Tangan Scan */
        .ttd-asli {
            height: 60px; /* Atur tinggi tanda tangan */
            width: auto;
            margin-top: 5px;
            margin-bottom: -5px; /* Menarik nama sedikit ke atas */
        }
        
        .ttd-nama {
            font-weight: bold;
            text-decoration: underline;
            margin-top: 0;
        }
        
        /* Gambar Cap/Stempel Scan */
        .cap-asli {
            position: absolute;
            height: 90px; /* Ukuran cap sedikit lebih besar dari ttd */
            width: auto;
            
            /* POSISI CAP: Mengatur seberapa jauh menimpa TTD */
            right: 130px; /* Jarak dari kanan container */
            top: 10px;    /* Jarak dari atas container */
            
            z-index: 1;   /* Di bawah tanda tangan, tapi di atas kertas */
            opacity: 0.9; /* Sedikit transparan agar terlihat realistis menimpa teks */
            
            /* Rotasi sedikit agar terlihat seperti dicap manual (tidak kaku) */
            transform: rotate(-10deg); 
        }

    </style>
