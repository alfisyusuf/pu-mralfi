<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Fisika | Candy Pop Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 40%, #A18CD1 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .bouncy-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
        }
        .nav-btn {
            transition: all 0.2s ease-in-out;
        }
        
        /* Animasi untuk buka/tutup panel navigasi */
        .nav-grid-wrapper {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .nav-grid-wrapper.open {
            /* Max-height diset besar agar cukup untuk 40 soal, bisa disesuaikan jika soal tambah banyak */
            max-height: 500px; 
            opacity: 1;
            /* Tambahkan scroll vertical di dalam panel jika layarnya kecil */
            overflow-y: auto; 
        }

        /* Scrollbar cantik untuk panel navigasi (opsional) */
        .nav-grid-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 8px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8">

    <div class="w-full max-w-4xl mb-6 text-center text-white">
        <h1 class="text-3xl md:text-4xl font-extrabold drop-shadow-md mb-2">🍭 Simulasi PSAJ Fisika</h1>
        <p class="text-white/90 font-semibold tracking-wide">Latihan Mandiri &bull; Mr Alfi & Mr Azhar</p>
    </div>

    <div id="app-container" class="bg-white/95 backdrop-blur-sm w-full max-w-4xl rounded-[2rem] shadow-2xl border-4 border-white flex flex-col">
        
        <div class="bg-gray-50 border-b-2 border-gray-100 rounded-t-[1.8rem]">
            
            <div class="p-4 sm:p-6 flex items-center justify-between cursor-pointer hover:bg-gray-100 transition-colors rounded-t-[1.8rem]" onclick="toggleNav()">
                <div class="flex items-center gap-3">
                    <button id="toggle-nav-icon" class="text-pink-500 font-bold text-xl w-8 h-8 flex items-center justify-center bg-pink-100 rounded-full transition-transform duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <div>
                        <h3 class="font-bold text-gray-800 text-lg leading-tight">Navigasi Soal</h3>
                        <p class="text-xs text-gray-500">Klik untuk melihat seluruh nomor</p>
                    </div>
                </div>
                <span id="progress-text" class="text-sm font-extrabold text-pink-600 bg-pink-100 border border-pink-200 px-4 py-1.5 rounded-full shadow-sm">
                    0/40 Terjawab
                </span>
            </div>

            <div id="nav-grid-wrapper" class="nav-grid-wrapper bg-white border-t border-gray-100 px-4 pb-6 pt-2">
                <div id="nav-container" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2 sm:gap-3">
                    </div>
            </div>
        </div>

        <div class="p-5 sm:p-8 flex-grow" id="quiz-container">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <span id="q-topic" class="inline-block bg-cyan-100 text-cyan-700 text-xs font-extrabold px-4 py-1.5 rounded-full uppercase tracking-wider border-2 border-cyan-200 shadow-sm">
                    Topik
                </span>
                <span class="text-gray-400 font-bold text-sm bg-gray-100 px-3 py-1 rounded-full border border-gray-200">
                    Soal <span id="current-q-num" class="text-gray-800 text-lg">1</span> / 40
                </span>
            </div>
            
            <h2 id="q-text" class="text-xl sm:text-2xl text-gray-800 font-bold mb-8 leading-relaxed">Pertanyaan dimuat...</h2>
            
            <div id="options-container" class="space-y-4">
                </div>

            <div id="feedback-container" class="mt-8 hidden border-l-4 rounded-xl p-5 sm:p-6 shadow-sm">
                <h3 id="feedback-title" class="font-extrabold text-xl mb-2 flex items-center gap-2">Jawaban</h3>
                <p id="feedback-tutor" class="text-gray-700 text-base leading-relaxed bg-white/60 p-4 rounded-lg mt-3"></p>
                
                <div class="mt-6 flex flex-wrap gap-3">
                    <button id="next-btn" class="bouncy-btn bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg hidden">
                        Soal Selanjutnya &rarr;
                    </button>
                    <button id="finish-btn" class="bouncy-btn bg-gradient-to-r from-pink-400 to-rose-500 hover:from-pink-500 hover:to-rose-600 text-white font-bold py-3 px-8 rounded-full shadow-lg hidden">
                        🎉 Selesai & Lihat Skor
                    </button>
                </div>
            </div>
        </div>

        <div id="result-container" class="hidden text-center py-12 px-6">
            <div class="text-7xl mb-6 bouncy-btn inline-block">🏆</div>
            <h2 class="text-4xl font-extrabold text-gray-800 mb-2">Latihan Selesai!</h2>
            <p class="text-gray-500 font-medium mb-8 text-lg">Kerja bagus! Ini dia hasil akhir kamu:</p>
            
            <div class="inline-block bg-gradient-to-br from-pink-100 to-purple-100 border-4 border-white shadow-xl rounded-[2rem] p-8 mb-8">
                <div class="text-6xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-2">
                    <span id="final-score">0</span>
                </div>
                <p class="text-purple-600 font-bold uppercase tracking-widest text-sm">Nilai Kamu</p>
            </div>

            <div>
                <button onclick="location.reload()" class="bouncy-btn bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-10 rounded-full shadow-xl text-lg">
                    🔄 Coba Lagi
                </button>
            </div>
        </div>
    </div>

    <script id="database-soal" type="application/json">
    [
        {

            "topic": "Pengukuran (Angka Penting)",
            "type": "theory",
            "question": "Seorang siswa mengukur ketebalan kawat menggunakan Mikrometer Sekrup dan mencatat hasilnya <b>2,50 mm</b>. Mengapa angka nol di akhir tersebut (2,50) berstatus sebagai angka penting?",
            "options": [
                "A. Membuat angka terlihat lebih ilmiah.",
                "B. Menunjukkan bahwa instrumen memiliki ketelitian hingga 0,01 mm.",
                "C. Menunjukkan kawat tepat 2,5 mm tanpa error.",

                "E. Hanya sebagai penempat posisi (placeholder)."

            "answer": 1,
            "tutor": "♟️ Bisikan Tutor: Angka nol di belakang desimal menunjukkan <b>ketelitian alat</b>. Menulis 2,5 mm (mistar biasa) berbeda maknanya dengan 2,50 mm (mikrometer). Ini soal tentang 'kejujuran' kepresisian alat ukur."
        },
        {
            "id": 2,
            "topic": "Pengukuran (Analisis Dimensi)",
            "type": "theory",
            "question": "Rumus periode (T) sebuah bandul bergantung pada panjang tali (L) dan gravitasi (g). Diketahui dimensi T adalah [T], L adalah [L], dan g adalah [L][T]&supmin;&sup2;. Manakah rumus di bawah ini yang paling konsisten secara dimensional?",
            "options": [
                "A. T = 2&pi; &radic;(g/L)",
                "B. T = 2&pi; &radic;(L/g)",
                "C. T = 2&pi; (L &middot; g)",
                "D. T = 2&pi; (g / L&sup2;)",
                "E. T = 2&pi; (L + g)"
            ],
            "answer": 1,
            "tutor": "♟️ Bisikan Tutor: Cek dimensi ruas kanan. L/g = [L] / ([L][T]&supmin;&sup2;) = [T]&sup2;. Jika diakar (&radic;), menjadi [T]. Cocok dengan ruas kiri! Cukup cocoklogi dimensi saja."
        },
        {
            "id": 3,
            "topic": "Pengukuran (Metode Ilmiah)",
            "type": "theory",
            "question": "<b>[LITERASI]</b> Andi menggunakan timbangan digital. Sebelum menimbang, layar sudah menunjukkan angka <b>0,5 gram</b> (Andi lupa menekan tombol Tare/Nol). Hasil akhir di layar menunjukkan <b>10,5 gram</b>. Berdasarkan kasus ini, apa jenis kesalahan Andi dan berapa massa zat sebenarnya?",
            "options": [
                "A. Kesalahan Acak; massa sebenarnya 10,5 gram.",
                "B. Kesalahan Paralaks; massa sebenarnya 10,0 gram.",
                "C. Kesalahan Sistematis; massa sebenarnya 10,0 gram.",
                "D. Kesalahan Sistematis; massa sebenarnya 11,0 gram.",
                "E. Kesalahan Hitung; massa sebenarnya 10,5 gram."
            ],
            "answer": 2,
            "tutor": "♟️ Bisikan Tutor: Kesalahan yang 'selalu bergeser sama' di awal adalah Kesalahan Sistematis (Zero Error). Logika: Total (10,5) = Wadah/Error (0,5) + Isi. Maka Isi sebenarnya = 10,0 gram."
        },
        {
            "id": 4,
            "topic": "Kinematika (Skalar vs Vektor)",
            "type": "theory",
            "question": "Seorang pelari berlari satu putaran penuh pada lintasan melingkar 400 meter dan kembali tepat ke garis start. Pernyataan mana yang benar mengenai geraknya?",
            "options": [
                "A. Jarak tempuh 0 m, perpindahannya 400 m.",

                "E. Kecepatannya 400 m/s."
            ],
            "answer": 2,
            "tutor": "♟️ Bisikan Tutor: Jarak (Distance) = langkah kaki/usaha. Perpindahan (Displacement) = perubahan posisi akhir vs awal. Balik ke awal berarti posisi tidak berubah (Perpindahan = 0)."
        },
        {
            "id": 5,
            "topic": "Kinematika (Grafik v-t)",
            "type": "theory",
            "question": "Pada grafik kecepatan terhadap waktu (v-t) pergerakan sebuah kereta, bagian manakah yang menunjukkan kereta bergerak dengan <b>kecepatan konstan</b> (percepatan nol)?",
            "options": [

            "answer": 1,
            "tutor": "♟️ Bisikan Tutor: Di grafik v-t, cari garis datar. Mendatar berarti nilainya tetap = kecepatan konstan = tidak digas dan tidak direm."
        },
        {
            "id": 6,

            "type": "theory",

            "options": [

        },
        {

        {

        },
        {
            "id": 10,
            "topic": "Dinamika (Kecepatan Terminal)",
            "type": "theory",
            "question": "Seorang penerjun payung melompat dari pesawat. Awalnya ia melesat jatuh, namun gesekan udara yang mendorongnya ke atas semakin membesar seiring kecepatannya. Saat gaya gesek udara menjadi <b>sama besar</b> dengan gaya beratnya, apa yang terjadi pada geraknya?",

        },
        {

        },
        {

            "type": "theory",

        {

        const navGridWrapper = document.getElementById('nav-grid-wrapper');
        const navContainer = document.getElementById('nav-container');
        const toggleNavIcon = document.getElementById('toggle-nav-icon');
        const qTopic = document.getElementById('q-topic');
        const qText = document.getElementById('q-text');
        const optionsContainer = document.getElementById('options-container');
        const currentQNum = document.getElementById('current-q-num');
        const progressText = document.getElementById('progress-text');
        
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackTutor = document.getElementById('feedback-tutor');
        const nextBtn = document.getElementById('next-btn');
        const finishBtn = document.getElementById('finish-btn');
        
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        const finalScoreEl = document.getElementById('final-score');

        // Inisialisasi
        initQuiz();

        function initQuiz() {
            // Set navigasi terbuka
            navGridWrapper.classList.add('open');
            renderNav();
            loadQuestion(currentIndex);
        }

        // Fungsi Buka/Tutup Navigasi (Accordion style)
        function toggleNav() {
            isNavOpen = !isNavOpen;
            if (isNavOpen) {
                navGridWrapper.classList.add('open');
                toggleNavIcon.style.transform = "rotate(0deg)";
            } else {
                navGridWrapper.classList.remove('open');
                toggleNavIcon.style.transform = "rotate(-90deg)"; // Panah menghadap kanan jika ditutup
            }
        }

        // Render Navigasi Grid
        function renderNav() {
            navContainer.innerHTML = '';
            let answeredCount = 0;

            questions.forEach((q, i) => {
                const btn = document.createElement('button');
                // Mengubah desain tombol agar pas di dalam grid
                btn.className = `nav-btn aspect-square w-full rounded-xl font-bold flex items-center justify-center border-2 border-transparent text-sm sm:text-base`;
                
                if (userAnswers[i] !== null) {
                    answeredCount++;
                    if (userAnswers[i].isCorrect) {
                        btn.classList.add('bg-teal-400', 'text-white', 'shadow-sm'); 
                    } else {
                        btn.classList.add('bg-rose-400', 'text-white', 'shadow-sm'); 
                    }
                } else {
                    btn.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200'); 
                }

                if (i === currentIndex) {
                    btn.classList.add('ring-4', 'ring-pink-300', 'scale-105', 'z-10');
                }

                btn.innerText = i + 1;
                btn.onclick = () => loadQuestion(i);
                navContainer.appendChild(btn);
            });

            progressText.innerText = `${answeredCount}/${questions.length} Terjawab`;

            if (answeredCount === questions.length) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            }
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = questions[currentIndex];
            const ansState = userAnswers[currentIndex];
            
            renderNav();

            feedbackContainer.classList.add('hidden');
            nextBtn.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            qTopic.innerText = q.topic;
            qText.innerHTML = q.question;
            currentQNum.innerText = currentIndex + 1;

            q.options.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = "bouncy-btn w-full text-left bg-white border-4 border-gray-100 hover:border-pink-200 text-gray-700 font-semibold py-4 px-6 rounded-2xl";
                btn.innerHTML = opt;
                
                if (ansState === null) {
                    btn.onclick = () => handleAnswer(optIndex);
                } else {
                    btn.disabled = true;
                    btn.classList.remove('bouncy-btn', 'hover:border-pink-200');
                    
                    if (optIndex === q.answer) {
                        btn.classList.replace('border-gray-100', 'border-teal-400');
                        btn.classList.replace('bg-white', 'bg-teal-50');
                    } else if (optIndex === ansState.selected && !ansState.isCorrect) {
                        btn.classList.replace('border-gray-100', 'border-rose-400');
                        btn.classList.replace('bg-white', 'bg-rose-50');
                    }
                }
                optionsContainer.appendChild(btn);
            });

            if (ansState !== null) {
                showFeedback(ansState.isCorrect, q);
            }
        }

        function handleAnswer(selectedIndex) {
            const q = questions[currentIndex];
            const isCorrect = (selectedIndex === q.answer);

            userAnswers[currentIndex] = {
                selected: selectedIndex,
                isCorrect: isCorrect
            };

            // Otomatis tutup navigasi saat user menjawab soal agar fokus
            if (isNavOpen) {
                toggleNav();
            }

            loadQuestion(currentIndex);
        }

        function showFeedback(isCorrect, q) {
            feedbackContainer.classList.remove('hidden');
            
            if (isCorrect) {
                feedbackContainer.className = "mt-8 border-l-8 rounded-2xl p-6 bg-teal-50 border-teal-400 shadow-sm animate-fade-in";
                feedbackTitle.innerHTML = "✅ Tepat Sekali!";
                feedbackTitle.className = "font-extrabold text-xl mb-2 text-teal-700";
            } else {
                feedbackContainer.className = "mt-8 border-l-8 rounded-2xl p-6 bg-rose-50 border-rose-400 shadow-sm animate-fade-in";
                feedbackTitle.innerHTML = "💡 Kurang Tepat, Mari Pelajari!";
                feedbackTitle.className = "font-extrabold text-xl mb-2 text-rose-700";
            }

            feedbackTutor.innerHTML = q.tutor;

            const answeredCount = userAnswers.filter(a => a !== null).length;
            
            if (answeredCount === questions.length) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }
        }

        nextBtn.onclick = () => {
            let nextIndex = currentIndex + 1;
            while (nextIndex < questions.length && userAnswers[nextIndex] !== null) {
                nextIndex++;
            }
            if (nextIndex >= questions.length) {
                nextIndex = userAnswers.indexOf(null);
            }
            
            if (nextIndex !== -1) {
                loadQuestion(nextIndex);
            }
        };

        finishBtn.onclick = () => {
            document.getElementById('app-container').classList.add('hidden');
            resultContainer.classList.remove('hidden');
            
            const correctCount = userAnswers.filter(a => a && a.isCorrect).length;
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            let currentScore = 0;
            const scoreInterval = setInterval(() => {
                finalScoreEl.innerText = currentScore;
                if (currentScore >= percentage) {
                    clearInterval(scoreInterval);
                    finalScoreEl.innerText = percentage;
                }
                currentScore++;
            }, 15);
        };
    </script>
</body>
</html>
