<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Fisika | Candy Pop Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 40%, #A18CD1 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .bouncy-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy-btn:hover:not(:disabled) {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
        }
        .nav-btn {
            transition: all 0.2s ease-in-out;
        }
        
        /* Animasi untuk buka/tutup panel navigasi */
        .nav-grid-wrapper {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .nav-grid-wrapper.open {
            /* Max-height diset besar agar cukup untuk 40 soal, bisa disesuaikan jika soal tambah banyak */
            max-height: 500px; 
            opacity: 1;
            /* Tambahkan scroll vertical di dalam panel jika layarnya kecil */
            overflow-y: auto; 
        }

        /* Scrollbar cantik untuk panel navigasi (opsional) */
        .nav-grid-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 8px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .nav-grid-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

    </style>
</head>

        <div class="p-5 sm:p-8 flex-grow" id="quiz-container">

            </div>

            <div id="options-container" class="space-y-4">
                </div>

                </div>
            </div>
        </div>

    <script>
        // 1. Ambil data JSON
        const rawData = document.getElementById('database-soal').textContent;
        const questions = JSON.parse(rawData);

        // 2. State Management
        let currentIndex = 0;
        let userAnswers = new Array(questions.length).fill(null); 
        let isNavOpen = true; // Default navigasi terbuka saat awal dimuat

        // Element DOM
        const navGridWrapper = document.getElementById('nav-grid-wrapper');
        const navContainer = document.getElementById('nav-container');
        const toggleNavIcon = document.getElementById('toggle-nav-icon');
        const qTopic = document.getElementById('q-topic');
        const qText = document.getElementById('q-text');
        const optionsContainer = document.getElementById('options-container');
        const currentQNum = document.getElementById('current-q-num');
        const progressText = document.getElementById('progress-text');
        
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackTutor = document.getElementById('feedback-tutor');
        const nextBtn = document.getElementById('next-btn');
        const finishBtn = document.getElementById('finish-btn');
        
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        const finalScoreEl = document.getElementById('final-score');

        // Inisialisasi
        initQuiz();

        function initQuiz() {
            // Set navigasi terbuka
            navGridWrapper.classList.add('open');
            renderNav();
            loadQuestion(currentIndex);
        }

        // Fungsi Buka/Tutup Navigasi (Accordion style)
        function toggleNav() {
            isNavOpen = !isNavOpen;
            if (isNavOpen) {
                navGridWrapper.classList.add('open');
                toggleNavIcon.style.transform = "rotate(0deg)";
            } else {
                navGridWrapper.classList.remove('open');
                toggleNavIcon.style.transform = "rotate(-90deg)"; // Panah menghadap kanan jika ditutup
            }
        }

        // Render Navigasi Grid
        function renderNav() {
            navContainer.innerHTML = '';
            let answeredCount = 0;

            questions.forEach((q, i) => {
                const btn = document.createElement('button');
                // Mengubah desain tombol agar pas di dalam grid
                btn.className = `nav-btn aspect-square w-full rounded-xl font-bold flex items-center justify-center border-2 border-transparent text-sm sm:text-base`;
                
                if (userAnswers[i] !== null) {
                    answeredCount++;
                    if (userAnswers[i].isCorrect) {
                        btn.classList.add('bg-teal-400', 'text-white', 'shadow-sm'); 
                    } else {
                        btn.classList.add('bg-rose-400', 'text-white', 'shadow-sm'); 
                    }
                } else {
                    btn.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200'); 
                }

                if (i === currentIndex) {
                    btn.classList.add('ring-4', 'ring-pink-300', 'scale-105', 'z-10');
                }

                btn.innerText = i + 1;
                btn.onclick = () => loadQuestion(i);
                navContainer.appendChild(btn);
            });

            progressText.innerText = `${answeredCount}/${questions.length} Terjawab`;

            if (answeredCount === questions.length) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            }
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = questions[currentIndex];
            const ansState = userAnswers[currentIndex];
            
            renderNav();

            feedbackContainer.classList.add('hidden');
            nextBtn.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            qTopic.innerText = q.topic;
            qText.innerHTML = q.question;
            currentQNum.innerText = currentIndex + 1;

            q.options.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = "bouncy-btn w-full text-left bg-white border-4 border-gray-100 hover:border-pink-200 text-gray-700 font-semibold py-4 px-6 rounded-2xl";
                btn.innerHTML = opt;
                
                if (ansState === null) {
                    btn.onclick = () => handleAnswer(optIndex);
                } else {
                    btn.disabled = true;
                    btn.classList.remove('bouncy-btn', 'hover:border-pink-200');
                    
                    if (optIndex === q.answer) {
                        btn.classList.replace('border-gray-100', 'border-teal-400');
                        btn.classList.replace('bg-white', 'bg-teal-50');
                    } else if (optIndex === ansState.selected && !ansState.isCorrect) {
                        btn.classList.replace('border-gray-100', 'border-rose-400');
                        btn.classList.replace('bg-white', 'bg-rose-50');
                    }
                }
                optionsContainer.appendChild(btn);
            });

            if (ansState !== null) {
                showFeedback(ansState.isCorrect, q);
            }
        }

        function handleAnswer(selectedIndex) {
            const q = questions[currentIndex];
            const isCorrect = (selectedIndex === q.answer);

            userAnswers[currentIndex] = {
                selected: selectedIndex,
                isCorrect: isCorrect
            };

            // Otomatis tutup navigasi saat user menjawab soal agar fokus
            if (isNavOpen) {
                toggleNav();
            }

            loadQuestion(currentIndex);
        }

        function showFeedback(isCorrect, q) {
            feedbackContainer.classList.remove('hidden');
            
            if (isCorrect) {
                feedbackContainer.className = "mt-8 border-l-8 rounded-2xl p-6 bg-teal-50 border-teal-400 shadow-sm animate-fade-in";
                feedbackTitle.innerHTML = "✅ Tepat Sekali!";
                feedbackTitle.className = "font-extrabold text-xl mb-2 text-teal-700";
            } else {
                feedbackContainer.className = "mt-8 border-l-8 rounded-2xl p-6 bg-rose-50 border-rose-400 shadow-sm animate-fade-in";
                feedbackTitle.innerHTML = "💡 Kurang Tepat, Mari Pelajari!";
                feedbackTitle.className = "font-extrabold text-xl mb-2 text-rose-700";
            }

            feedbackTutor.innerHTML = q.tutor;

            const answeredCount = userAnswers.filter(a => a !== null).length;
            
            if (answeredCount === questions.length) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }
        }

        nextBtn.onclick = () => {
            let nextIndex = currentIndex + 1;
            while (nextIndex < questions.length && userAnswers[nextIndex] !== null) {
                nextIndex++;
            }
            if (nextIndex >= questions.length) {
                nextIndex = userAnswers.indexOf(null);
            }
            
            if (nextIndex !== -1) {
                loadQuestion(nextIndex);
            }
        };

        finishBtn.onclick = () => {
            document.getElementById('app-container').classList.add('hidden');
            resultContainer.classList.remove('hidden');
            
            const correctCount = userAnswers.filter(a => a && a.isCorrect).length;
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            let currentScore = 0;
            const scoreInterval = setInterval(() => {
                finalScoreEl.innerText = currentScore;
                if (currentScore >= percentage) {
                    clearInterval(scoreInterval);
                    finalScoreEl.innerText = percentage;
                }
                currentScore++;
            }, 15);
        };
    </script>
</body>
</html>
